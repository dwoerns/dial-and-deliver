<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Du bist abgemeldet — Dial &amp; Deliver</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fffff0;
    color: #111111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 32px;
  }

  .content {
    max-width: 560px;
    text-align: center;
  }

  .logo {
    height: 36px;
    width: auto;
    margin-bottom: 56px;
  }

  .goldline {
    width: 60px;
    height: 1px;
    background: #c9a84c;
    margin: 0 auto 32px;
  }

  h1 {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin-bottom: 24px;
  }

  .lead {
    font-size: 19px;
    font-weight: 400;
    line-height: 1.55;
    color: #555555;
    margin-bottom: 40px;
  }

  .body-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.7;
    color: #111111;
    margin-bottom: 48px;
  }

  .button {
    display: inline-block;
    padding: 16px 32px;
    background: #111111;
    color: #fffff0;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: opacity 0.2s ease;
  }

  .button:hover {
    opacity: 0.85;
  }

  .footer {
    padding: 32px;
    text-align: center;
    border-top: 1px solid #c0c0c0;
  }

  .footer p {
    font-size: 12px;
    font-weight: 300;
    color: #575757;
    line-height: 1.65;
  }

  .footer a {
    color: #717171;
    text-decoration: none;
  }

  @media (max-width: 640px) {
    h1 { font-size: 38px; letter-spacing: -1px; }
    .lead { font-size: 17px; }
    .body-text { font-size: 16px; }
    .container { padding: 60px 24px; }
    .logo { margin-bottom: 40px; }
  }
</style>
</head>
<body>

<main class="container">
  <div class="content">

    <!-- Logo: Pfad anpassen je nach Repo-Struktur -->
    <img src="D_4.png" alt="Dial & Deliver" class="logo">

    <div class="goldline"></div>

    <h1>Du bist abgemeldet.</h1>

    <p class="body-text">Falls du dich umentscheidest — du weißt, wo du uns findest.</p>

    <p class="body-text">Bis dahin: Lass dir den nächsten Anruf nicht von einem schlecht gelaunten Prospect verderben.</p>

    <a href="https://dial-and-deliver.io" class="button">Zurück zur Startseite →</a>

  </div>
</main>

<footer class="footer">
  <p>Dial &amp; Deliver · <a href="mailto:insights@dial-and-deliver.io">insights@dial-and-deliver.io</a></p>
</footer>

</body>
</html>
